apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: postgresql
  namespace: argocd

spec:
  project: default

  source:
    repoURL: registry-1.docker.io/bitnamicharts
    chart: postgresql
    targetRevision: 18.7.13

    helm:
      values: |
        auth:
          postgresPassword: postgres
          username: mlflow
          password: mlflow
          database: mlflow

  destination:
    server: https://kubernetes.default.svc
    namespace: mlflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
