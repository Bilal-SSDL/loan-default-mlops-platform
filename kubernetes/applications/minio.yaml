apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: minio
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: minio
    targetRevision: 17.0.21

    helm:
      values: |
        auth:
          rootUser: admin
          rootPassword: admin123

        defaultBuckets: mlflow

        persistence:
          enabled: true
          size: 10Gi

        mode: standalone

  destination:
    server: https://kubernetes.default.svc
    namespace: mlflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true